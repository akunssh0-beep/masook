<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Registrasi Petugas - Masook AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc; 
            user-select: none; 
            color: #1e293b;
            overflow: hidden;
            height: 100vh;
        }
        .masook-gradient-dinkes {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
        }
        .glass-card { 
            background: white; 
            border: 1px solid #f1f5f9;
        }
        .input-field { 
            @apply w-full bg-slate-50 border border-slate-200 px-5 py-3.5 rounded-2xl font-semibold focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all text-sm mb-4; 
        }
        .label-style { 
            @apply text-[10px] font-extrabold text-slate-400 uppercase ml-2 mb-1.5 block tracking-wider; 
        }
        
        @keyframes bounceIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-bounceIn { 
            animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .pulse-emerald {
            animation: pulse-emerald 2s infinite;
        }
        @keyframes pulse-emerald {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>

    <!-- PWA Optimized by it.adi.p Automator -->
    <meta name="theme-color" content="#3b82f6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body class="flex flex-col">

    <div class="masook-gradient-dinkes pt-12 pb-24 px-8 rounded-b-[3.5rem] shadow-2xl relative overflow-hidden shrink-0">
        <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-16 -mt-16 blur-2xl"></div>
        <div class="relative z-10 flex flex-col items-center text-center">
            <button onclick="window.location.href='index.html'" class="absolute left-0 top-1 w-10 h-10 bg-white/20 backdrop-blur-md rounded-xl flex items-center justify-center text-white border border-white/30 active:scale-90 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            <div class="w-14 h-14 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center mb-3 border border-white/30 shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                </svg>
            </div>
            <h1 class="text-white font-extrabold text-xl tracking-tight uppercase leading-none">Registrasi Petugas</h1>
            <p class="text-emerald-100 text-[9px] font-bold uppercase tracking-[0.2em] mt-2 opacity-90">UPTD PKM Sampanahan</p>
        </div>
    </div>

    <main class="max-w-md mx-auto w-full px-6 -mt-10 relative z-20 flex-grow overflow-y-auto pb-10">
        <div class="glass-card p-7 rounded-[2.5rem] shadow-2xl shadow-emerald-900/5">
            <div class="flex items-center gap-2 mb-6">
                <div class="w-1 h-5 bg-emerald-500 rounded-full"></div>
                <h2 class="text-slate-800 font-extrabold text-[11px] uppercase tracking-widest">Identitas Pegawai Baru</h2>
            </div>

            <div class="mb-1">
                <label class="label-style">Nomor Induk Pegawai (NIP)</label>
                <input type="number" id="reg-nip" placeholder="Masukkan 18 digit NIP..." class="input-field">
            </div>

            <div class="mb-6">
                <label class="label-style">Nama Lengkap Petugas</label>
                <input type="text" id="reg-nama" placeholder="Ketik nama sesuai KTP..." class="input-field">
            </div>

            <button id="btn-simpan" onclick="prosesSimpan()" class="pulse-emerald w-full masook-gradient-dinkes text-white py-4 rounded-2xl font-extrabold text-[11px] uppercase tracking-widest shadow-lg shadow-emerald-100 active:scale-[0.97] transition-all flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                </svg>
                <span id="btn-text">Simpan ke Cloud</span>
            </button>
            
            <div class="mt-8 flex flex-col items-center text-center">
                <p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest leading-relaxed">
                    Sistem akan memvalidasi data ke database<br>pusat secara otomatis.
                </p>
            </div>
        </div>
    </main>

    <div id="modal-face" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-md p-6">
        <div class="glass-card w-full max-w-xs rounded-[3rem] p-8 text-center shadow-2xl animate-bounceIn relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1.5 masook-gradient-dinkes"></div>
            
            <div class="w-16 h-16 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            
            <h3 class="font-extrabold text-slate-800 text-lg uppercase tracking-tight mb-2">Simpan Berhasil</h3>
            <p class="text-slate-400 text-[10px] leading-relaxed mb-8 font-semibold uppercase tracking-wider">
                Lanjutkan pendaftaran wajah<br>untuk fitur absen face AI?
            </p>
            
            <div class="space-y-3">
                <button onclick="daftarWajahSekarang()" class="w-full masook-gradient-dinkes text-white py-3.5 rounded-xl font-extrabold text-[10px] uppercase tracking-widest shadow-md active:scale-95 transition-all">
                    Daftar Wajah
                </button>
                <button type="button" onclick="finishLater()" class="w-full bg-slate-100 text-slate-400 py-3.5 rounded-xl font-extrabold text-[10px] uppercase tracking-widest active:scale-95 transition-all">
                    Selesai
                </button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-6 left-0 right-0 text-center shrink-0">
        <p class="text-[8px] font-extrabold text-slate-300 uppercase tracking-[0.4em]">Masook System • v3.0</p>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzHHaHNY3KKqftUB4DkSKof4uG15dRl61AHqURfpUMpui9npiAfY6J6jURHc4n0QJXO/exec"; 

        async function prosesSimpan() {
            const nip = document.getElementById('reg-nip').value;
            const nama = document.getElementById('reg-nama').value;
            const btn = document.getElementById('btn-simpan');
            const btnText = document.getElementById('btn-text');

            if (!nip || !nama) {
                alert("⚠️ Mohon lengkapi NIP dan Nama Petugas!");
                return;
            }

            // UI Loading State
            btn.disabled = true;
            btn.classList.add('opacity-70');
            const originalContent = btn.innerHTML;
            btn.innerHTML = `
                <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Sinkronisasi...</span>
            `;

            try {
                const formData = new URLSearchParams();
                formData.append('action', 'register_data_only');
                formData.append('nip', nip);
                formData.append('nama', nama);

                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    body: formData
                });

                // Simpan data di localStorage untuk digunakan di halaman registrasi wajah
                localStorage.setItem('temp_reg_user', JSON.stringify({ nip, nama }));

                setTimeout(() => {
                    document.getElementById('modal-face').classList.remove('hidden');
                    btn.disabled = false;
                    btn.classList.remove('opacity-70');
                    btn.innerHTML = originalContent;
                }, 1500);

            } catch (err) {
                alert("❌ Gagal terhubung ke Cloud. Periksa koneksi internet Anda.");
                btn.disabled = false;
                btn.classList.remove('opacity-70');
                btn.innerHTML = originalContent;
            }
        }

        function finishLater() {
            localStorage.removeItem('temp_reg_user');
            window.location.replace('index.html');
        }

        function daftarWajahSekarang() {
            window.location.href = 'index.html?mode=registrasi';
        }
    </script>

        .pwa-info { flex: 1; }

        .pwa-install-btn:active { background: #016b4c; }
    </style>
    <div id="pwa-install-ui">
        <div class="pwa-icon-box"></div>
        <div class="pwa-info">
            <p class="pwa-name">My Awesome App</p>
            <span class="pwa-meta">Versi 1.0.0 • Siap Offline</span>
            <div class="pwa-stars">★★★★★ <span style="color:#5f6368;margin-left:4px">Play Store Standard</span></div>
        </div>
        <button class="pwa-install-btn" id="pwa-cta">Instal</button>
    </div>
    <script>
      let pwaPrompt;
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').then(reg => {
            console.log('SW Registered');
            reg.onupdatefound = () => { const worker = reg.installing; worker.onstatechange = () => { if (worker.state === "installed" && navigator.serviceWorker.controller) window.location.reload(); }; };
          });
        });
      }
      
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); pwaPrompt = e;
        setTimeout(() => document.getElementById('pwa-install-ui')?.classList.add('visible'), 2500);
      });
      document.getElementById('pwa-cta')?.addEventListener('click', async () => {
        if (pwaPrompt) { 
            pwaPrompt.prompt(); 
            const { outcome } = await pwaPrompt.userChoice; 
            if (outcome === 'accepted') document.getElementById('pwa-install-ui').classList.remove('visible');
            pwaPrompt = null; 
        }
      });
    </script>
</body>
</html>
